<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BoilerMatch - Interests</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>BoilerMatch</h1>
      <p>Find your perfect club at Purdue!</p>
    </div>

    <h2>What are you interested in?</h2>
    <p class="subtext">Select at least one category</p>

    <div class="interest" onclick="toggleSelect(this)">
      ❤️ Fitness
    </div>

    <div class="interest" onclick="toggleSelect(this)">
      🎨 Art
    </div>

    <div class="interest" onclick="toggleSelect(this)">
      🎉 Entertainment
    </div>

    <div class="interest" onclick="toggleSelect(this)">
      💻 Technology
    </div>

    <div class="interest" onclick="toggleSelect(this)">
      🤝 Service
    </div>

    <div class="interest" onclick="toggleSelect(this)">
      💼 Business
    </div>

    <div class="interest" onclick="toggleSelect(this)">
      🌍 Cultural
    </div>

    <button class="match-btn" onclick="goToSwipe()">Match!</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
