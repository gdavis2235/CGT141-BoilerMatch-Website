<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BoilerMatch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>BoilerMatch</h1>
      <p>Find your perfect club at Purdue!</p>
    </div>

    <h2>Which campus are you on?</h2>
    <p class="subtext">Select your Purdue campus</p>

    <div class="card campus" onclick="window.location.href='interests.html'">
      <img src="images/west-lafayette.jpg" alt="West Lafayette">
      <div class="overlay">
        <h3>West Lafayette</h3>
        <p>Main campus</p>
      </div>
    </div>

    <div class="card campus" onclick="window.location.href='interests.html'">
      <img src="images/indy.jpg" alt="Indianapolis">
      <div class="overlay">
        <h3>Purdue Indianapolis</h3>
        <p>Indianapolis campus</p>
      </div>
    </div>

  </div>

</body>
</html>
