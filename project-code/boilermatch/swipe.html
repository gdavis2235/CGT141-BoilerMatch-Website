<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BoilerMatch - Swipe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="swipe-container">

    <div class="header">
      <h1>BoilerMatch</h1>
    </div>

    <!-- Swipe Card -->
    <div class="swipe-card" id="card">
    </div>

    <!-- Swipe Buttons -->
    <div class="buttons">
      <button class="no" onclick="swipeLeft()">❌</button>
      <button class="yes" onclick="swipeRight()">❤️</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
